<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/app.js" defer></script>
    <title>Formulaire — L'Observatoire</title>
</head>
<body>
    <header>
        <h1 id="title">✦ L'Observatoire</h1>
        <nav>
            <ul id="navbar">
                <li><a href="index.html" class="page_link">Accueil</a></li>
                <li><a href="article.html" class="page_link">Articles</a></li>
                <li><a href="#" class="page_link active_page">Formulaire</a></li>
            </ul>
        </nav>
    </header>

    <main class="main">
        <form action="#" method="post" enctype="multipart/form-data">
            <h2 id="form_title">Écrire un article</h2>
            <p id="form_intro">Partagez vos découvertes, observations et réflexions cosmiques.</p>

            <label for="titre">Titre :</label><br>
            <input type="text" id="titre" name="titre" placeholder="Ex : La supernova qui a tout changé..." required class="input_form"><br>

            <label for="auteur">Auteur :</label><br>
            <input type="text" id="auteur" name="auteur" placeholder="Votre nom ou pseudo" class="input_form"><br>

            <label for="categorie">Catégorie :</label><br>
            <select id="categorie" name="categorie" class="input_form">
                <option value="" disabled selected>Choisir une catégorie...</option>
                <option value="astrophysique">Astrophysique</option>
                <option value="exploration">Exploration spatiale</option>
                <option value="cosmologie">Cosmologie</option>
            </select><br>

            <label for="contenu">Contenu :</label><br>
            <textarea id="contenu" name="contenu" rows="6" cols="40" placeholder="Rédigez votre article ici..." required class="input_form"></textarea><br>

            <label for="image">Image :</label><br>
            <input type="file" id="image" name="image" accept="image/*" class="input_form"><br>

            <p id="form_note">* Les champs Titre et Contenu sont obligatoires</p>

            <button type="submit" class="lire_la_suite">Publier l'article →</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 L'Observatoire — Tous droits réservés</p>
    </footer>
</body>
</html>
